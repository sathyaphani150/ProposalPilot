[build]
  command = "cd frontend && npm ci && npm run build"
  publish = "frontend/dist"

[context.production.environment]
  VITE_API_BASE_URL = "https://proposalpilot.onrender.com/api/v1"
  VITE_WS_BASE_URL = "wss://proposalpilot.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
