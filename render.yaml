services:
  - type: web
    name: proposalpilot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_CORS_ORIGINS
        value: '["https://proposal-pilot-cognine.netlify.app","http://localhost:5173","http://localhost:5174","http://localhost:3000"]'
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: openai/gpt-oss-120b
      - key: RFP_ANALYSIS_MODEL
        value: openai/gpt-oss-120b
      - key: DATABASE_URL
        fromDatabase:
          name: proposalpilot-db
          property: connectionString

databases:
  - name: proposalpilot-db
    plan: free
